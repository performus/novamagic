name: Deploy NOVAMAGIC to Yandex Object Storage

on:
  push:
    branches: [main]
  workflow_dispatch:   # можно запускать вручную из вкладки Actions

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist to Object Storage
        uses: povsister/[email protected]
        with:
          aws_key_id:     ${{ secrets.YC_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          aws_bucket:     ${{ secrets.YC_BUCKET }}
          endpoint:       https://storage.yandexcloud.net
          source_dir:     dist
          destination_dir: ''
          delete_removed: true     # удаляет в бакете то, чего больше нет в dist
